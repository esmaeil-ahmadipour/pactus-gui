name: 'Upload Windows Release Assets'
description: 'Create a GitHub release, and upload the asset for Windows.'
inputs:
  tag_name:
    description: 'The name of the tag'
    required: true
  release_name:
    description: 'The title of the release'
    required: true
  release_body:
    description: 'The body/description of the release'
    required: true
  github_token:
    description: 'The GitHub token for creating the release'
    required: true
  file_name:
    description: 'The name of the asset file, that must be uploaded/attached to the release.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Set up GitHub CLI
      uses: cli/cli-action@v2
      with:
        github-token: ${{ inputs.github_token }}

    - name: Create Windows Release (if not exists)
      shell: bash
      run: |
        if gh release view "${{ inputs.tag_name }}" > /dev/null 2>&1; then
          echo "✅ Release '${{ inputs.tag_name }}' already exists. Skipping creation."
        else
          echo "📦 Creating release '${{ inputs.tag_name }}'..."
          gh release create "${{ inputs.tag_name }}" "build/windows/x64/runner/Release/${{ inputs.file_name }}" \
            --title "${{ inputs.release_name }}" \
            --notes "${{ inputs.release_body }}"
        fi

    - name: Upload Windows Release Asset (if not exists)
      shell: bash
      run: |
        ASSET_NAME="${{ inputs.file_name }}"
        TAG_NAME="${{ inputs.tag_name }}"
        FILE_PATH="build/windows/x64/runner/Release/$ASSET_NAME"

        if gh release view "$TAG_NAME" --json assets -q ".assets[].name" | grep -q "$ASSET_NAME"; then
          echo "✅ Asset '$ASSET_NAME' already exists. Skipping upload."
        else
          echo "⬆️ Uploading asset '$ASSET_NAME'..."
          gh release upload "$TAG_NAME" "$FILE_PATH"
        fi
