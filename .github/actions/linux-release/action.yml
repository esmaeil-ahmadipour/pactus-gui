name: 'Linux Release'
description: 'Archive the Linux build files, rename the zip file, create a GitHub release, and upload the asset.'
runs:
  using: 'composite'

  steps:
    - name: Archive Linux Build Files
      id: archive_linux_build
      shell: bash
      run: |
        # Navigate to the build directory
        cd build/linux/x64/release/bundle

        # Create a zip archive with the correct file name
        FILE_NAME="linux-build-${{ inputs.tag_name }}.zip"
        zip -r "${FILE_NAME}" .

        # Set the file name as an output
        echo "file_name=${FILE_NAME}" >> $GITHUB_OUTPUT

    - name: Create Linux Release
      id: create_linux_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }} # Use the input instead of secrets.GITHUB_TOKEN
      with:
        tag_name: ${{ inputs.tag_name }}
        release_name: "${{ inputs.release_name }}"
        body: "${{ inputs.release_body }}"
        draft: false
        prerelease: false

    - name: Upload Linux Release Asset
      id: upload_linux_release_asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag_name }}
        files: build/linux/x64/release/bundle/${{ steps.archive_linux_build.outputs.file_name }}

# Define action inputs
inputs:
  tag_name:
    description: 'The name of the tag'
    required: true
  release_name:
    description: 'The title of the release'
    required: true
  release_body:
    description: 'The body/description of the release'
    required: true
  github_token:
    description: 'The GitHub token for creating the release'
    required: true

# Define action outputs
outputs:
  file_name:
    description: 'The name of the uploaded file'
    value: ${{ steps.archive_linux_build.outputs.file_name }}