name: 'Linux Release'
description: 'Create a GitHub release, and upload the asset.'
runs:
  using: 'composite'

  steps:
    - name: Create Linux Release
      id: create_linux_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.get_tag_name.outputs.tag_name }}
        release_name: "${{ steps.get_tag_name.outputs.tag_name }}"
        body: "${{ steps.get_tag_message.outputs.release_body }}"
        draft: false
        prerelease: false

    - name: Upload Linux Release Asset
      id: upload_linux_release_asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_tag_name.outputs.tag_name }}
        files: build/linux/x64/release/bundle/${{ steps.build_linux_app.outputs.file_name }}

inputs:
  tag_name:
    description: 'The name of the tag'
    required: true
  release_name:
    description: 'The title of the release'
    required: true
  release_body:
    description: 'The body/description of the release'
    required: true
  github_token:
    description: 'The GitHub token for creating the release'
    required: true
  file_name:
    description: 'The name of the asset file  , that must be upload/attach to release form.'
    required: true