name: 'Extract Tag Details'
description: 'Extract tag details and create a description.'
runs:
  using: 'composite'
  steps:
    - name: Extract Tag Name
      id: extract-tag
      shell: bash
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        echo "title=$TAG_NAME" >> $GITHUB_OUTPUT

    - name: Read Tag Description
      id: read-tag-description
      shell: bash
      run: |
        if [ -f "tag_message.txt" ]; then
          TAG_DESCRIPTION=$(cat tag_message.txt)
        else
          TAG_DESCRIPTION="No additional details provided."
        fi
        echo "tag_description=$TAG_DESCRIPTION" >> $GITHUB_OUTPUT

    - name: Create Description
      id: create-description
      shell: bash
      run: |
        echo "🚀 **Automated Release for ${{ steps.extract-tag.outputs.tag_name }}**" >> description.txt
        echo "" >> description.txt
        echo "${{ steps.read-tag-description.outputs.tag_description }}" >> description.txt
        echo "" >> description.txt
        echo "### Notes:" >> description.txt
        echo "- This release includes all updates from the previous version." >> description.txt
        echo "- Please report any issues on our [GitHub Issues](https://github.com/your-repo/issues) page." >> description.txt

        DESCRIPTION=$(cat description.txt)
        echo "description=$DESCRIPTION" >> $GITHUB_OUTPUT

        rm description.txt

# Define action outputs
outputs:
  tag_name:
    description: 'The name of the tag'
    value: ${{ steps.extract-tag.outputs.tag_name }}
  title:
    description: 'The title of the tag'
    value: ${{ steps.extract-tag.outputs.title }}
  tag_description:
    description: 'The description of the tag'
    value: ${{ steps.read-tag-description.outputs.tag_description }}
