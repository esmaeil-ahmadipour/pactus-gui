name: Linux Release Build (ARM64 + AppImage)
env:
  LINUX_ASSETS_URL: "https://github.com/pactus-project/pactus/releases/download/v1.7.1/pactus-cli_1.7.1_linux_arm64.tar.gz"

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release-linux-arm64:
    runs-on: ubuntu-latest

    outputs:
      tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
      release_body: ${{ steps.get_tag_details.outputs.release_body }}
      file_name: ${{ steps.prepared_artifact_file.outputs.file_name }}
      download_link: ${{ steps.prepare_download_links.outputs.download_link }}
      release_link: ${{ steps.prepare_download_links.outputs.release_link }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'
          cache: true

      - name: Install Flutter Project Dependencies
        uses: ./.github/actions/utils/install-flutter-dependencies

      - name: Install AppImage build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            squashfs-tools \
            desktop-file-utils \
            libglib2.0-bin

      - name: Prepare Tag Metadata
        id: get_tag_details
        uses: ./.github/actions/utils/extract-tag-metadata
        with:
          github_ref: ${{ github.ref }}

      - name: Build Linux ARM64 Artifacts
        uses: ./.github/actions/linux/build-artifacts-arm64

      - name: Move Build Files To Artifacts
        uses: ./.github/actions/utils/move-files-to-artifacts

      - name: Add Daemon Files To Artifacts
        id: prepared_artifact_file
        uses: ./.github/actions/linux/add-daemon-files
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          arch: arm64

      - name: Install AppImage build dependencies (ARM64)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            squashfs-tools \
            desktop-file-utils \
            libglib2.0-bin \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            qemu-user-static

      - name: Create AppImage (ARM64)
        run: |
          APP_NAME="pactus-gui"
          BUNDLE_DIR="build/linux/arm64/release/bundle"
          RELEASE_DIR="build/linux/arm64/release"

          # Ensure proper permissions on build dir
          sudo mkdir -p "$BUNDLE_DIR"
          sudo chown -R $USER:$USER "$BUNDLE_DIR"
          chmod -R u+w "$BUNDLE_DIR"
          mkdir -p "$RELEASE_DIR"

          # Prepare .desktop file
          DESKTOP_FILE="$BUNDLE_DIR/$APP_NAME.desktop"
          if [ ! -f "linux/$APP_NAME.desktop" ]; then
            echo "[Desktop Entry]" > "$DESKTOP_FILE"
            echo "Version=1.0" >> "$DESKTOP_FILE"
            echo "Type=Application" >> "$DESKTOP_FILE"
            echo "Name=${APP_NAME^}" >> "$DESKTOP_FILE"
            echo "Exec=$APP_NAME" >> "$DESKTOP_FILE"
            echo "Icon=$APP_NAME" >> "$DESKTOP_FILE"
            echo "Comment=My Flutter Application" >> "$DESKTOP_FILE"
            echo "Categories=Utility;" >> "$DESKTOP_FILE"
          else
            cp "linux/$APP_NAME.desktop" "$DESKTOP_FILE"
            sed -i 's/Categories=.*/Categories=Utility;/' "$DESKTOP_FILE"
          fi

          # Copy icon if available
          if [ -f "linux/$APP_NAME.png" ]; then
            cp "linux/$APP_NAME.png" "$BUNDLE_DIR/"
          fi

          # Ensure proper permissions on build dirs
          sudo mkdir -p "$BUNDLE_DIR"
          sudo mkdir -p "$RELEASE_DIR"
          sudo chown -R $USER:$USER "$BUNDLE_DIR" "$RELEASE_DIR"
          chmod -R u+w "$BUNDLE_DIR" "$RELEASE_DIR"

          # Download appimagetool
          wget -q -O appimagetool.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage

          # Create AppImage
          ARCH=aarch64 ./appimagetool.AppImage "$BUNDLE_DIR" "$RELEASE_DIR/$APP_NAME-v0.1.4-arm64.AppImage"

      - name: Upload ZIP Artifact (Linux arm64)
        uses: ./.github/actions/linux/release
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          release_name: ${{ steps.get_tag_details.outputs.tag_name }}
          release_body: ${{ steps.get_tag_details.outputs.release_body }}
          file_name: ${{ steps.prepared_artifact_file.outputs.file_name }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          arch: arm64

      - name: Upload AppImage Artifact
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          name: Release ${{ steps.get_tag_details.outputs.tag_name }}
          body: |
            Includes both ZIP and AppImage builds (ARM64).
          draft: false
          prerelease: false
          files: ${{ env.appimage_file }}

      - name: Generate Release Download Links
        id: prepare_download_links
        uses: ./.github/actions/utils/generate-download-links
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          file_name: ${{ steps.prepared_artifact_file.outputs.file_name }}

  notify-linux-arm64:
    needs: build-and-release-linux-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 **GUI Release (ARM64):** [${{ needs.build-and-release-linux-arm64.outputs.tag_name }}](${{ needs.build-and-release-linux-arm64.outputs.release_link }})  
            📥 [Download Linux-arm64 ZIP](${{ needs.build-and-release-linux-arm64.outputs.download_link }})

      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: |
            🚀 **GUI Release (ARM64):** [${{ needs.build-and-release-linux-arm64.outputs.tag_name }}](${{ needs.build-and-release-linux-arm64.outputs.release_link }})  
            📥 [Download Linux-arm64 ZIP](${{ needs.build-and-release-linux-arm64.outputs.download_link }})

