name: Linux Release Build

# Add environment variables at the top level
env:
  LINUX_ASSETS_URL: "https://github.com/pactus-project/pactus/releases/download/v1.6.4/pactus-cli_1.6.4_linux_amd64.tar.gz"

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.2.3

jobs:
  build-and-release-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract tag name
        id: get_tag_name
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Extracted tag name: $TAG_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Get and prepare tag message
        id: get_tag_message
        shell: bash
        run: |
          # Extract tag name
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          # Get the tag message
          TAG_MESSAGE=$(git tag -l --format='%(contents)' $TAG_NAME)
          
          # Write the tag message to a file (optional, if you still need the file)
          TAG_MESSAGE_FILE="tag_message.txt"
          echo "$TAG_MESSAGE" > $TAG_MESSAGE_FILE
          echo "Tag message written to: $TAG_MESSAGE_FILE"
          
          # Set the release body as an output
          echo "release_body<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        uses: ./.github/actions/preparing-release

      - name: Install Linux dependencies
        uses: ./.github/actions/linux-install-dependencies

      - name: Build Linux Application
        id: build_linux_app
        uses: ./.github/actions/linux-build-app
        with:
          tag_name: ${{ steps.get_tag_name.outputs.tag_name }}

      - name: Linux Release
        uses: ./.github/actions/linux-release
        with:
          tag_name: ${{ steps.get_tag_name.outputs.tag_name }}
          release_name: ${{ steps.get_tag_name.outputs.tag_name }}
          release_body: ${{ steps.get_tag_message.outputs.release_body }}
          file_name: ${{ steps.build_linux_app.outputs.file_name }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Download Links
        id: prepare_download_links
        uses: ./.github/actions/prepare-download-links
        with:
          tag_name: ${{ steps.get_tag_name.outputs.tag_name }}
          file_name: ${{ steps.build_linux_app.outputs.file_name }}

      - name: Send Discord Notification
        uses: ./.github/actions/notification-to-discord
        with:
          os: Linux
          download_link: ${{ steps.prepare_download_links.outputs.download_link }}
          release_link: ${{ steps.prepare_download_links.outputs.release_link }}
          discord_webhook: ${{ secrets.DISCORD_WEBHOOK }}
