name: "AppImage Build and Upload ARM64 "
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-appimage-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Build AppImage in ARM64 Docker
        run: |
          docker run --rm --platform linux/arm64 \
            -v $(pwd):/app -w /app \
            arm64v8/ubuntu:22.04 \
            bash -c '
              apt update && apt install -y curl git unzip build-essential libgtk-3-dev \
                libfuse2 fuse squashfs-tools \
                && curl -s https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.22.0-stable.tar.xz | tar xfJ - \
                && git config --global --add safe.directory /app/flutter \
                && export PATH=$PATH:/app/flutter/bin \
                && flutter precache --flutter-tools \
                && flutter doctor -v \
                && flutter pub get \
                && ./scripts/build-linux-appimage.sh
            '

      - name: Upload ARM64 AppImage to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "./*.AppImage"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
