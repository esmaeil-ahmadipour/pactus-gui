name: Create Tag

runs-on: ubuntu-latest

needs: extract-version-changelog

steps:
  - name: Checkout repository
    uses: actions/checkout@v3

  - name: Create tag
    run: |
      git tag -a "${{ needs.extract-version-changelog.outputs.version }}" -m "${{ needs.extract-version-changelog.outputs.changelog }}"
      git push origin "${{ needs.extract-version-changelog.outputs.version }}"