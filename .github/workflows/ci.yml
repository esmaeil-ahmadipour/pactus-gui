name: Linting & Tests Validation
on:
  pull_request:
    branches:
      - main

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'

      - name: Install dependencies
        run: flutter pub get

  lint_and_test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Run Dart Format Check
        uses: ./.github/actions/dart-format-check

      - name: Generate Localization Files
        uses: ./.github/actions/generate-localization

      - name: Validate Localization Files
        uses: ./.github/actions/validate-localization

      - name: Run Flutter Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

  merge_check:
    runs-on: ubuntu-latest
    needs: lint_and_test
    if: ${{ success() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Merge Pull Request
        run: echo "Linting and tests passed successfully. Merge request is ready for merge"