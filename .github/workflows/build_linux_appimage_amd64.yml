name: Linux Release Build (AMD64 + Healthy AppImage)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release-linux-amd64:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y libfuse2 build-essential patchelf wget zsync squashfs-tools \
            libgtk-3-dev libglib2.0-dev libnss3 libxss1 libasound2 libx11-dev libgl1-mesa-dev

      - name: Install Flutter Project Dependencies
        uses: ./.github/actions/utils/install-flutter-dependencies

      - name: Build Flutter Linux Bundle
        run: flutter build linux --release

      - name: Prepare AppDir and Collect Files
        run: |
          rm -rf AppDir
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps

          # Copy the main binary
          cp build/linux/x64/release/bundle/pactus-gui AppDir/usr/bin/
          chmod +x AppDir/usr/bin/pactus-gui

          # Copy desktop file and icon
          cp linux/pactus-gui.desktop AppDir/usr/share/applications/
          cp linux/pactus-gui.png AppDir/usr/share/icons/hicolor/512x512/apps/

          # Fix Exec path in desktop file
          sed -i 's|Exec=.*|Exec=AppRun|g' AppDir/usr/share/applications/pactus-gui.desktop

      - name: Prepare custom AppRun file
        run: |
          cat <<'EOF' > linux/AppRun
#!/bin/bash
HERE="$(dirname "$(readlink -f "$0")")"
export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
exec "$HERE/usr/bin/pactus-gui" "$@"
EOF
          chmod +x linux/AppRun

      - name: Download AppImage Tools
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -O linuxdeploy
          wget https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x linuxdeploy appimagetool

      - name: Build AppImage
        run: |
          ./linuxdeploy --appdir AppDir \
                        --desktop-file AppDir/usr/share/applications/pactus-gui.desktop \
                        --icon-file AppDir/usr/share/icons/hicolor/512x512/apps/pactus-gui.png \
                        --output appimage \
                        --custom-apprun linux/AppRun
          chmod +x ./*.AppImage

      - name: Test AppImage (headless)
        run: |
          chmod +x ./pactus-gui*.AppImage
          ./pactus-gui*.AppImage --version || echo "✅ Ran AppImage in CI (GUI not needed)"

      - name: Get Tag Details
        id: get_tag_details
        run: echo "tag_name=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Set AppImage File Name
        id: prepared_artifact_file
        run: echo "file_name=$(ls *.AppImage | head -n 1)" >> "$GITHUB_OUTPUT"

      - name: Upload Built AppImage as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PactusGUI-AppImage
          path: ./*.AppImage

      - name: Upload AppImage to GitHub Release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          name: Release ${{ steps.get_tag_details.outputs.tag_name }}
          body: |
            ✅ Includes Pactus GUI AppImage for Linux (64-bit).
          draft: false
          prerelease: false
          files: ${{ steps.prepared_artifact_file.outputs.file_name }}
