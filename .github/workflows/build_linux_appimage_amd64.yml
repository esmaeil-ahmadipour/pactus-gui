name: Linux Release Build (AMD64 + AppImage)

env:
  LINUX_ASSETS_URL: "https://github.com/pactus-project/pactus/releases/download/v1.7.1/pactus-cli_1.7.1_linux_amd64.tar.gz"

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release-linux-amd64:
    runs-on: ubuntu-22.04  # Changed from ubuntu-latest to specific LTS version

    outputs:
      tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
      release_body: ${{ steps.get_tag_details.outputs.release_body }}
      file_name: ${{ steps.prepared_artifact_file.outputs.file_name }}
      download_link: ${{ steps.prepare_download_links.outputs.download_link }}
      release_link: ${{ steps.prepare_download_links.outputs.release_link }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Up Flutter Environment
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.3'
          channel: 'stable'
          cache: true

      - name: Install Flutter Project Dependencies
        uses: ./.github/actions/utils/install-flutter-dependencies

      - name: Install Linux Build Dependencies (AMD64)
        uses: ./.github/actions/linux/install-dependencies-amd64

      - name: Prepare Tag Metadata
        id: get_tag_details
        uses: ./.github/actions/utils/extract-tag-metadata
        with:
          github_ref: ${{ github.ref }}

      - name: Build Linux AMD64 Artifacts
        uses: ./.github/actions/linux/build-artifacts-amd64

      - name: Move Build Files To Artifacts
        uses: ./.github/actions/utils/move-files-to-artifacts

      - name: Add Daemon Files To Artifacts
        id: prepared_artifact_file
        uses: ./.github/actions/linux/add-daemon-files
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          arch: x64


      - name: Install AppImage build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            squashfs-tools \
            desktop-file-utils \
            libglib2.0-bin \
            fuse \
            imagemagick-6.q16

      - name: Install ImageMagick (for icon fallback)
        run: sudo apt-get install -y imagemagick

      - name: Create AppImage (AMD64)
        run: |
          APP_NAME="pactus-gui"
          BUNDLE_DIR="build/linux/x64/release/bundle"
          RELEASE_DIR="build/linux/x64/release"

          # Ensure icon exists (critical fix)
          if [ ! -f "$BUNDLE_DIR/$APP_NAME.png" ]; then
            echo "Copying icon file..."
            if [ -f "linux/$APP_NAME.png" ]; then
              cp "linux/$APP_NAME.png" "$BUNDLE_DIR/"
            else
              echo "Error: Missing required icon file linux/$APP_NAME.png"
              echo "Creating placeholder icon..."
              convert -size 256x256 xc:white "$BUNDLE_DIR/$APP_NAME.png" ||
                { echo "Failed to create placeholder icon"; exit 1; }
            fi
          fi

          # Download appimagetool
          wget -q -O appimagetool-x86_64.AppImage https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
    
          # Build AppImage with verbose output
          ./appimagetool-x86_64.AppImage \
            --runtime-file /usr/bin/fusermount \
            --no-appstream \
            --verbose \
            "$BUNDLE_DIR" \
            "$RELEASE_DIR/$APP_NAME-${{ steps.get_tag_details.outputs.tag_name }}-x86_64.AppImage" ||
            { echo "AppImage creation failed!"; ls -la "$BUNDLE_DIR"; exit 1; }
    
          # Validate
          if [ -f "$RELEASE_DIR/$APP_NAME-${{ steps.get_tag_details.outputs.tag_name }}-x86_64.AppImage" ]; then
            echo "AppImage built successfully!"
            echo "appimage_file=$RELEASE_DIR/$APP_NAME-${{ steps.get_tag_details.outputs.tag_name }}-x86_64.AppImage" >> $GITHUB_ENV
          else
            echo "AppImage validation failed!"
            ls -la "$RELEASE_DIR"
            exit 1
          fi

      - name: Upload ZIP Artifact (Linux x64)
        uses: ./.github/actions/linux/release
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          release_name: ${{ steps.get_tag_details.outputs.tag_name }}
          release_body: ${{ steps.get_tag_details.outputs.release_body }}
          file_name: ${{ steps.prepared_artifact_file.outputs.file_name }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          arch: x64

      - name: Upload AppImage Artifact
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          name: Release ${{ steps.get_tag_details.outputs.tag_name }}
          body: |
            Includes both ZIP and AppImage builds.
          draft: false
          prerelease: false
          files: ${{ env.appimage_file }}

      - name: Generate Release Download Links
        id: prepare_download_links
        uses: ./.github/actions/utils/generate-download-links
        with:
          tag_name: ${{ steps.get_tag_details.outputs.tag_name }}
          file_name: ${{ steps.prepared_artifact_file.outputs.file_name }}

  notify-linux:
    needs: build-and-release-linux-amd64
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 **GUI Release:** [${{ needs.build-and-release-linux-amd64.outputs.tag_name }}](${{ needs.build-and-release-linux-amd64.outputs.release_link }})  
            📥 [Download Linux-amd64 ZIP](${{ needs.build-and-release-linux-amd64.outputs.download_link }})

      - name: Send Slack Notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: |
            🚀 **GUI Release:** [${{ needs.build-and-release-linux-amd64.outputs.tag_name }}](${{ needs.build-and-release-linux-amd64.outputs.release_link }})  
            📥 [Download Linux-amd64 ZIP](${{ needs.build-and-release-linux-amd64.outputs.download_link }})
